<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Природа и пейзажи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Play', Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* Меню навигации */
        .page-header {
            background-color: #2c3e50;
            padding: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .top-nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 60px;
        }

        .top-nav__item a {
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            padding: 10px 20px;
            transition: all 0.3s;
            border-radius: 5px;
        }

        .top-nav__item a:hover {
            background-color: #34495e;
            color: #3498db;
        }

        /* Галерея изображений */
        .gallery {
            padding: 40px 0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            height: 300px;
            text-decoration: none;
            display: block;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item__caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 20px 10px 10px;
            font-size: 14px;
            text-align: center;
        }

        /* Адаптивность */
        @media (max-width: 968px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .top-nav ul {
                gap: 30px;
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            
            .top-nav ul {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* Футер */
        .page-footer {
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css?family=Play" rel="stylesheet">
</head>
<body>
    <!-- Шапка с меню -->
    <header class="page-header">
        <div class="container">
            <nav class="top-nav">
                <ul>
                    <li class="top-nav__item"><a href="/">главная</a></li>
                    <li class="top-nav__item"><a href="/3d-models">3д моделей</a></li>
                    <li class="top-nav__item"><a href="/info">Общая информация</a></li>
                    <li class="top-nav__item"><a href="pages/contacts.html">контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Галерея изображений -->
    <main class="gallery">
        <div class="container">
            <div class="gallery-grid">
                <a href="pages/nikitapdnin.html" class="gallery-item">
                    <img src="pictures/nikitapanin.jpg" alt="Изображение 1">
                    <div class="gallery-item__caption">картинка 1</div>
                </a>
                <a href="pages/2.html" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&h=400&fit=crop" alt="Изображение 2">
                    <div class="gallery-item__caption">картинка 2</div>
                </a>
                <a href="pages/3.html" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1500595046743-cd271d694d30?w=600&h=400&fit=crop" alt="Изображение 3">
                    <div class="gallery-item__caption">картинка 3</div>
                </a>
                <a href="pages/4.html" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&h=400&fit=crop" alt="Изображение 4">
                    <div class="gallery-item__caption">картинка 4</div>
                </a>
                <a href="pages/5.html" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&h=400&fit=crop" alt="Изображение 5">
                    <div class="gallery-item__caption">картинка 5</div>
                </a>
                <a href="pages/6.html" class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=600&h=400&fit=crop" alt="Изображение 6">
                    <div class="gallery-item__caption">картинка 6</div>
                </a>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="page-footer">
        <div class="container">
            <p>&copy; 2026 Все права защищены</p>
        </div>
    </footer>
</body>
</html>
