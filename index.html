<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Проект: Оптимизированное дерево</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #e0f7fa;
      font-family: Arial, sans-serif;
    }
    #scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      max-width: 80%;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
    }
    #info.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="scene-container"></div>
  <div id="info">Это красивое дерево. Кликните по нему еще раз, чтобы скрыть описание.</div>
  <div id="status">Загрузка...</div>

  <script src="js/three.min.js"></script>
  <script src="js/GLTFLoader.min.js"></script>
  <script src="js/DRACOLoader.min.js"></script>
  <script src="js/OrbitControls.min.js"></script>

  <script>
    let scene, camera, renderer, controls, treeModel = null;
    const infoBox = document.getElementById('info');
    const statusEl = document.getElementById('status');

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xcccccc);

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 2, 6);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.getElementById('scene-container').appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const sun = new THREE.DirectionalLight(0xffffff, 1);
      sun.position.set(5, 10, 5);
      scene.add(sun);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minPolarAngle = Math.PI / 2; 
      controls.maxPolarAngle = Math.PI / 2;
      controls.target.set(0, 1, 0);

      const loader = new THREE.GLTFLoader();
      
      // Настройка локального Draco декодера
      const dracoLoader = new THREE.DRACOLoader();
      // Указываем локальную папку js/draco/
      dracoLoader.setDecoderPath('js/draco/');
      loader.setDRACOLoader(dracoLoader);

      loader.load(
        'Tree1.glb', 
        (gltf) => {
          const model = gltf.scene;
          
          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3()).length();
          const scale = 3 / size;
          model.scale.set(scale, scale, scale);

          const center = box.getCenter(new THREE.Vector3());
          model.position.x = -center.x * scale;
          model.position.y = -box.min.y * scale; 
          model.position.z = -center.z * scale;

          scene.add(model);
          treeModel = model;

          statusEl.textContent = "Готово. Кликните по дереву.";
          statusEl.style.background = 'rgba(0,100,0,0.7)';
          setTimeout(() => statusEl.style.opacity = '0', 2000);
        },
        (xhr) => {
          if (xhr.lengthComputable) {
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            statusEl.textContent = `Загрузка: ${percent}%`;
          }
        },
        (error) => {
          console.error('Ошибка:', error);
          statusEl.textContent = '❌ Ошибка загрузки!';
          statusEl.style.background = 'rgba(200,0,0,0.8)';
        }
      );

      renderer.domElement.addEventListener('click', onSceneClick);
      window.addEventListener('resize', onWindowResize);
    }

    function onSceneClick(event) {
      if (!treeModel) return;
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(treeModel, true);
      if (intersects.length > 0) {
        infoBox.classList.toggle('visible');
      } else {
        infoBox.classList.remove('visible');
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
